<!DOCTYPE html>
<html>

<head>
    <title>PI POC</title>
    <script src="https://unpkg.com/vue@3"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"
        integrity="sha256-kLaT2GOSpHechhsozzB+flnD+zUyjE2LlfWPgU04xyI=" crossorigin="" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <style>
        #map {
            width: 100%;
            height: 95vh;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div id="app">
            <div class="row mt-3">
                <div class="col-xl-4">
                    <form @submit.prevent="findParticipants" class="row g-3">
                        <div class="col-auto">
                            <label for="name" class="form-label">Nom : </label>
                        </div>
                        <div class="col-auto">
                            <input type="text" class="form-control" id="name" placeholder="nom à chercher">
                        </div>
                        <div class="col-auto">
                            <button type="submit" class="btn btn-primary mb-3">Chercher</button>
                        </div>
                    </form>
                    <table v-if="!errorMessage && participants.length > 0 " class="table">
                        <thead>
                            <tr>
                                <th scope="col">id</th>
                                <th scope="col">Prénom</th>
                                <th scope="col">Nom</th>
                                <th scope="col"># Stops</th>
                                <th scope="col">Couleur</th>
                                <th scope="col">Visibilité</th>
                            </tr>
                        </thead>
                        <tr v-for="participant in participants" :key="participant.id">
                            <td>{{participant.id}}</td>
                            <td>{{participant.prenom}}</td>
                            <td>{{participant.nom}}</td>
                            <td>{{participant.nbreStops}}</td>
                            <td v-if="participant.nbreStops > 0">
                                <input type="color" :value="participant.markerColor"
                                    @change="changeColor($event, participant)" />
                            </td>
                            <td v-if="participant.nbreStops > 0">
                                    <svg v-if="participant.stopsVisible" @click="hideStops(participant)" class="bi" width="32" height="32" fill="currentColor">
                                        <use xlink:href="bootstrap-icons.svg#eye-slash-fill" />
                                    </svg>
                                    <svg v-else @click="displayStops(participant)" class="bi" width="32" height="32" fill="currentColor">
                                        <use xlink:href="bootstrap-icons.svg#eye-fill" />
                                    </svg>
                            </td>
                        </tr>
                    </table>
                    <!-- Dialogue Modal pour afficher les détails du feature sélectionné -->
                    <div class="modal fade" id="featureDetails" data-bs-backdrop="static" data-bs-keyboard="false"
                        tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h1 class="modal-title fs-5" id="staticBackdropLabel">Stop n°
                                        {{(selectedStop)?selectedStop.stop_id:''}}</h1>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"
                                        aria-label="Close"></button>
                                </div>
                                <div class="modal-body">
                                    <div class="mb-3">
                                        <label for="dateDebutInput" class="form-label">Date début</label>
                                        <input type="text" class="form-control" id="dateDebutInput" :value="(selectedStop)?selectedStop.date_debut:''" disabled>
                                      </div>
                                      <div class="mb-3">
                                        <label for="dateFinInput" class="form-label">Date fin</label>
                                        <input type="text" class="form-control" id="dateFinInput" :value="(selectedStop)?selectedStop.date_fin:''" disabled>
                                      </div>
                                      <div class="mb-3">
                                        <label for="commentaireTextArea" class="form-label">Commentaire</label>
                                        <textarea class="form-control" id="commentaireTextArea" rows="3"></textarea>
                                      </div>
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary"
                                        data-bs-dismiss="modal">Fermer</button>
                                    <button type="button" class="btn btn-primary">Enregistrer</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div v-if="errorMessage">
                        <p>Erreur : {{ errorMessage }}</p>
                    </div>
                </div>

                <div class="col-xl-8">
                    <div id="map"></div>
                </div>

            </div> <!-- fin du row -->
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"
        integrity="sha256-WBkoXOwTeyKclOHuWtc+i2uENFpDZ9YPdf5Hf+D7ewM=" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
    <script src="js/demoStops.js"></script>
</body>

</html>
